<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Raj Narayan Singh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f1a;
      color: #f0f4f8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 40px; }
    .code { font-size: 96px; font-weight: 800; color: #00d4d4; letter-spacing: -4px; margin-bottom: 8px; }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .desc { font-size: 14px; color: rgba(240,244,248,0.5); margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: #00d4d4;
      color: #0a0f1a;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 400px;
      height: 400px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0,212,212,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
  <script>
    // GitHub Pages SPA redirect support
    var segmentCount = 1;
    var l = window.location;
    if (l.pathname.split('/').length > segmentCount + 1) {
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, segmentCount + 1).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
  </script>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="desc">The page you're looking for doesn't exist or has been moved.</div>
    <a href="/" class="btn">← Return to Portfolio</a>
  </div>
</body>
</html>
