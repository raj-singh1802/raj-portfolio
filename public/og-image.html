<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Image — Raj Narayan Singh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0a0f1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    .container {
      width: 100%;
      height: 100%;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }
    /* Glow */
    .glow-1 {
      position: absolute;
      top: -120px;
      left: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,212,212,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .glow-2 {
      position: absolute;
      bottom: -100px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,166,150,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(0,212,212,0.7);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .name {
      font-size: 52px;
      font-weight: 800;
      color: #f0f4f8;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .role {
      font-size: 20px;
      color: rgba(240, 244, 248, 0.6);
      font-weight: 400;
      margin-bottom: 32px;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #00d4d4, transparent);
      margin-bottom: 28px;
    }
    .products {
      display: flex;
      gap: 24px;
    }
    .product {
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }
    .product-icon { font-size: 16px; margin-right: 8px; }
    .product-name {
      font-size: 13px;
      color: #f0f4f8;
      font-weight: 500;
    }
    .product-tag {
      font-size: 10px;
      color: rgba(0,212,212,0.7);
      font-weight: 400;
      margin-left: 4px;
    }
    .url {
      position: absolute;
      bottom: 30px;
      right: 50px;
      font-size: 11px;
      color: rgba(240, 244, 248, 0.3);
      font-weight: 400;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="label">AI Engineer · Agentic AI · Backend Engineering</div>
    <div class="name">Raj Narayan<br />Singh</div>
    <div class="role">Building enterprise AI products for production</div>
    <div class="divider"></div>
    <div class="products">
      <div class="product">
        <span class="product-icon">📸</span>
        <span class="product-name">EventLens AI</span>
        <span class="product-tag">Computer Vision</span>
      </div>
      <div class="product">
        <span class="product-icon">🛡️</span>
        <span class="product-name">RevenueGuard AI</span>
        <span class="product-tag">Agentic AI</span>
      </div>
      <div class="product">
        <span class="product-icon">🎙️</span>
        <span class="product-name">AI Tutor Screener</span>
        <span class="product-tag">LLMs</span>
      </div>
    </div>
    <div class="url">raj-singh1802.github.io</div>
  </div>
</body>
</html>
