<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,212,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,166,150,0.06)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4d4"/>
      <stop offset="100%" stop-color="#00a896"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4d4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gradient blobs -->
  <circle cx="150" cy="150" r="280" fill="url(#glow1)"/>
  <circle cx="1050" cy="520" r="240" fill="url(#glow2)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="rgba(255,255,255,0.02)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Label -->
  <text x="80" y="120" font-family="'Courier New', monospace" font-size="14" font-weight="500" letter-spacing="4" fill="rgba(0,212,212,0.6)">
    AI ENGINEER · AGENTIC AI · BACKEND ENGINEERING
  </text>

  <!-- Name -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="#f0f4f8" letter-spacing="-1.5">
    Raj Narayan
  </text>
  <text x="80" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="#f0f4f8" letter-spacing="-1.5">
    Singh
  </text>

  <!-- Role -->
  <text x="80" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="rgba(240,244,248,0.55)">
    Building enterprise AI products for production
  </text>

  <!-- Divider -->
  <rect x="80" y="365" width="60" height="2" rx="1" fill="url(#divider)"/>

  <!-- Product cards -->
  <g transform="translate(80, 400)">
    <!-- Card bg -->
    <rect x="0" y="0" width="200" height="56" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="16" y="24" font-size="18">📸</text>
    <text x="46" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#f0f4f8">EventLens AI</text>
    <text x="46" y="42" font-family="'Courier New', monospace" font-size="11" fill="rgba(139,92,246,0.8)">Computer Vision</text>
  </g>

  <g transform="translate(300, 400)">
    <rect x="0" y="0" width="215" height="56" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="16" y="24" font-size="18">🛡️</text>
    <text x="46" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#f0f4f8">RevenueGuard AI</text>
    <text x="46" y="42" font-family="'Courier New', monospace" font-size="11" fill="rgba(245,158,11,0.8)">Agentic AI</text>
  </g>

  <g transform="translate(535, 400)">
    <rect x="0" y="0" width="205" height="56" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="16" y="24" font-size="18">🎙️</text>
    <text x="46" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#f0f4f8">AI Tutor Screener</text>
    <text x="46" y="42" font-family="'Courier New', monospace" font-size="11" fill="rgba(0,212,212,0.8)">LLMs</text>
  </g>

  <!-- URL -->
  <text x="80" y="560" font-family="'Courier New', monospace" font-size="12" fill="rgba(240,244,248,0.2)" letter-spacing="1">
    raj-singh1802.github.io
  </text>

  <!-- RS logo top-right -->
  <g transform="translate(1080, 60)">
    <rect x="0" y="0" width="48" height="48" rx="8" fill="#0a0f1a" stroke="rgba(0,212,212,0.3)" stroke-width="1.5"/>
    <text x="24" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#00d4d4" text-anchor="middle">RS</text>
  </g>
</svg>
